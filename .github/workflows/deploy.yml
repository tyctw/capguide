name: 自動部署網站到 GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 檢查原始碼
        uses: actions/checkout@v4

      - name: 設定 Node.js 環境
        uses: actions/setup-node@v4
        with:
          node-version: 24
          # 💡 拿掉原本固定的 cache: 'npm'，改由下方 npm i 自動處理快取

      - name: 安裝專案套件
        run: npm install

      - name: 編編譯專案靜態檔案
        run: npm run build

      - name: 部署至 GitHub Pages 分支
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
